apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-byteshield
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: byteshield
  template:
    metadata:
      labels:
        app: byteshield
    spec:
      containers:
        - name: byteshield
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          {{- if .Values.env }}
          env:
            {{- toYaml .Values.env | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
